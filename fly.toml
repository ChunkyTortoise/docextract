app = 'docextract-api'
primary_region = 'iad'

[build]

[env]
  ENVIRONMENT = 'production'
  LOG_LEVEL = 'INFO'
  OTEL_ENABLED = 'false'
  LANGFUSE_ENABLED = 'true'
  DEMO_MODE = 'true'
  PORT = '8000'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[http_service.checks]]
  grace_period = '30s'
  interval = '30s'
  method = 'GET'
  path = '/api/v1/health'
  timeout = '10s'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
