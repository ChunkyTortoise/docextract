schema_version: 1
name: docextract
version: 1.0.0
positioning: >
  Production-grade document intelligence platform demonstrating agentic RAG,
  LLMOps, MLOps, cloud infrastructure, and knowledge management — with 1,155
  tests, 94.6% eval accuracy, and full observability stack.

contact: caymanroden@gmail.com

quickstart:
  command: "DEMO_MODE=true streamlit run frontend/app.py"
  cloud_demo: "https://docextract-demo.streamlit.app"
  sla_days: 7

environments:
  required:
    - database_url
    - redis_url
    - anthropic_api_key
    - gemini_api_key
  optional:
    - otel_enabled
    - demo_mode
    - extraction_models
    - confidence_thresholds

# Services this repo demonstrates (from professional services catalog)
services_demonstrated:

  - id: S3
    name: "Custom RAG Conversational Agents"
    price_range: "$3,600-$5,200"
    market_rate: "$4,500-$6,500"
    proof_of_work:
      - "Agentic RAG ReAct loop with 5 retrieval tools (app/services/agentic_rag.py)"
      - "Hybrid BM25 + pgvector HNSW search with RRF fusion (app/services/bm25.py)"
      - "Multi-document synthesis via map-reduce (app/services/multi_doc_synthesizer.py)"
      - "Semantic cache (cosine similarity, sub-ms lookup, Prometheus counters)"
    certifications:
      - "IBM RAG and Agentic AI (24h)"
      - "IBM Generative AI Engineering (144h)"
      - "Duke LLMOps Specialization (48h)"

  - id: S4
    name: "Multi-Agent Workflows"
    price_range: "$5,200-$8,000"
    market_rate: "$6,500-$10,000"
    proof_of_work:
      - "ReAct agent orchestrating 5 specialized retrieval tools autonomously"
      - "MCP tool server for Claude Desktop / any MCP-compatible agent (mcp_server.py)"
      - "Confidence-gated iteration with fallback to human review queue"
      - "SSE streaming of agent reasoning steps (Think → Act → Observe)"
    certifications:
      - "IBM RAG and Agentic AI (24h)"
      - "Vanderbilt Agentic AI (40h)"
      - "IBM Generative AI Engineering (144h)"

  - id: S17
    name: "Cloud Infrastructure Setup and Migration"
    price_range: "$4,000-$6,800"
    market_rate: "$5,000-$8,500"
    proof_of_work:
      - "Kubernetes/Kustomize with HPA (deploy/k8s/) — base + production overlays"
      - "AWS Terraform: EC2, ECR, RDS PostgreSQL 16, ElastiCache Redis 7, S3 (deploy/aws/)"
      - "Multi-stage Docker builds published to GHCR via GitHub Actions"
      - "Prometheus + Grafana + Jaeger full observability stack (docker-compose.observability.yml)"
    certifications:
      - "Google Cloud GenAI Leader (25h)"
      - "Microsoft AI & ML Engineering (75h)"

  - id: S18
    name: "MLOps Model Deployment Pipeline"
    price_range: "$5,200-$8,000"
    market_rate: "$6,500-$10,000"
    proof_of_work:
      - "Semver prompt versioning with automated regression testing (app/services/prompt_registry.py)"
      - "Model A/B testing with z-test statistical significance (app/services/model_ab_test.py)"
      - "DeepEval CI gates — blocks merge on quality regression (tests/evaluation/)"
      - "Per-request USD cost tracking with Decimal precision (app/services/cost_tracker.py)"
      - "Fine-tuning data pipeline: supervised JSONL, DPO pairs, eval JSONL (app/services/finetune_exporter.py)"
    certifications:
      - "Duke LLMOps Specialization (48h)"
      - "IBM Generative AI Engineering (144h)"
      - "Microsoft AI & ML Engineering (75h)"

  - id: S24
    name: "AI-Powered Knowledge Management System"
    price_range: "$6,400-$16,000"
    market_rate: "$8,000-$20,000"
    proof_of_work:
      - "Document ingestion pipeline: PDF, images, email, plain text (app/services/ingestion.py)"
      - "Semantic search over extracted records with 768-dim Gemini embeddings"
      - "Hybrid retrieval: vector + BM25 + reciprocal rank fusion"
      - "Per-document-type structured extraction with Pydantic schemas"
      - "Human-in-the-loop review queue with full audit trail"
    certifications:
      - "IBM RAG and Agentic AI (24h)"
      - "IBM Generative AI Engineering (144h)"
      - "Duke LLMOps Specialization (48h)"

deliverables:
  - Review queue API (/api/v1/review/*)
  - ROI API (/api/v1/roi/*)
  - Executive report API (/api/v1/reports/*)
  - Two-pass extraction with human-in-the-loop fallback
  - Agentic RAG search (/api/v1/agent-search)
  - Structured typed extraction (/api/v1/extract/structured)
  - MCP tool server (mcp_server.py)
  - Full observability stack (Prometheus + Grafana + Jaeger)

smoke_tests:
  - "curl -s http://localhost:8000/api/v1/health"
  - "curl -s http://localhost:8000/api/v1/review/metrics -H 'X-API-Key: <key>'"
  - "pytest -q tests/integration/test_review_and_roi.py"

acceptance_checklist:
  - "Low-confidence items enter pending_review queue automatically"
  - "Claim/approve/correct flow produces immutable audit entries"
  - "SLA metrics expose stale queue and breach rate"
  - "ROI and report endpoints provide client-shareable outcomes"
  - "Golden eval CI gate passes at >= 92% accuracy threshold"
  - "DEMO_MODE serves pre-cached results without API keys"

handoff_outputs:
  - "API key and onboarding credentials checklist"
  - "Review queue baseline metrics snapshot"
  - "Generated report artifact IDs and paths"
  - "Grafana dashboard screenshots"
  - "Eval baseline accuracy report"
