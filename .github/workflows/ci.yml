name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 6 * * *'  # Nightly at 6:17 UTC (off-minute to avoid fleet congestion)

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install linting deps
        run: pip install ruff mypy
      - name: Dependency check
        run: python -m pip check
      - name: Validate offer-kit
        run: python scripts/validate_offer_kit.py
      - name: Ruff check
        run: ruff check app/ worker/ scripts/ frontend/
      - name: mypy
        run: mypy app/ worker/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: docextract_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install system deps
        run: sudo apt-get install -y tesseract-ocr libmagic1
      - name: Install Python deps
        run: pip install -r requirements.txt aiosqlite pytest-cov
      - name: Dependency check
        run: python -m pip check
      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/docextract_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: test-key
          API_KEY_SECRET: test-secret-32-chars-minimum-here
        run: pytest tests/ --cov=. --cov-report=xml --cov-fail-under=80 -v --tb=short
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  eval:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install Python deps
        run: pip install -r requirements.txt
      - name: Run eval regression gate (golden — no API calls)
        run: python scripts/run_eval_ci.py --ci
      - name: SROIE benchmark dry-run
        run: python scripts/benchmark_sroie.py --dry-run

  deepeval:
    name: DeepEval Quality Gate
    runs-on: ubuntu-latest
    needs: [test]
    services:
      postgres:
        image: ankane/pgvector:latest
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: docextract_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install system deps
        run: sudo apt-get install -y tesseract-ocr libmagic1
      - run: pip install -r requirements.txt aiosqlite deepeval
      - name: Run DeepEval CI tier (deterministic, no API calls)
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/docextract_test
          REDIS_URL: redis://localhost:6379/0
          ANTHROPIC_API_KEY: test-key
          API_KEY_SECRET: test-secret-32-chars-minimum-here
        run: pytest tests/unit/test_eval_deepeval.py -v --tb=short

  deepeval-nightly:
    name: DeepEval Nightly (LLM-as-judge)
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt deepeval
      - name: Run DeepEval nightly LLM-as-judge
        env:
          DEEPEVAL_NIGHTLY: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: pytest tests/unit/test_eval_deepeval.py -v --tb=short -k "Nightly"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f Dockerfile -t docextract-api .
      - name: Build Worker image
        run: docker build -f Dockerfile.worker -t docextract-worker .
      - name: Build Frontend image
        run: docker build -f Dockerfile.frontend -t docextract-frontend .

  ragas-eval:
    name: RAGAS Quality Gate
    runs-on: ubuntu-latest
    needs: [eval]
    if: github.ref == 'refs/heads/main'  # Only on main, not PRs
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run RAGAS evaluation
        env:
          RAGAS_ENABLED: "true"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LLM_JUDGE_ENABLED: "true"
        run: python -m pytest tests/eval/ -v --ragas-gate

  publish:
    runs-on: ubuntu-latest
    needs: [test, eval, docker-build]
    # Only publish on pushes to main (not on PRs)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/docextract-api:latest
            ghcr.io/${{ github.repository_owner }}/docextract-api:${{ github.sha }}
      - name: Build and push Worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.worker
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/docextract-worker:latest
            ghcr.io/${{ github.repository_owner }}/docextract-worker:${{ github.sha }}
      - name: Build and push Frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/docextract-frontend:latest
            ghcr.io/${{ github.repository_owner }}/docextract-frontend:${{ github.sha }}
