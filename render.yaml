services:
  - type: web
    name: docextract-api
    plan: standard
    env: python
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docextract-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: docextract-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: API_KEY_SECRET
        generateValue: true
      - key: AES_KEY
        generateValue: true
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_LOCAL_PATH
        value: /tmp/docextract-storage

  - type: worker
    name: docextract-worker
    plan: standard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m arq worker.main.WorkerSettings
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: docextract-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: docextract-redis
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: API_KEY_SECRET
        fromService:
          type: web
          name: docextract-api
          envVarKey: API_KEY_SECRET
      - key: AES_KEY
        fromService:
          type: web
          name: docextract-api
          envVarKey: AES_KEY
      - key: STORAGE_BACKEND
        value: local
      - key: STORAGE_LOCAL_PATH
        value: /tmp/docextract-storage

  - type: web
    name: docextract-frontend
    plan: starter
    env: python
    buildCommand: pip install streamlit plotly httpx pydantic
    startCommand: streamlit run frontend/app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: docextract-api
          property: host

  - type: keyvalue
    name: docextract-redis
    plan: standard
    ipAllowList:
      - source: 0.0.0.0/0
        description: allow all (internal only via Render private network)

databases:
  - name: docextract-db
    plan: basic-1gb
    databaseName: docextract
    user: docextract
