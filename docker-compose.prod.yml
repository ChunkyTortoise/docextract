version: "3.9"

services:
  api:
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    restart: always
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    restart: always
