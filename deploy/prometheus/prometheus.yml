global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: docextract-api
    static_configs:
      - targets:
          - docextract-api:8000  # Docker Compose service name
    metrics_path: /metrics
    # Note: OTEL_ENABLED=true must be set on the API service for /metrics to exist
