apiVersion: apps/v1
kind: Deployment
metadata:
  name: docextract-frontend
  namespace: docextract
  labels:
    app.kubernetes.io/name: docextract
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: docextract
      app.kubernetes.io/component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docextract
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          # Replace with your registry, e.g. ghcr.io/chunkytortoise/docextract-frontend:latest
          image: docextract-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8501
              name: http
          env:
            - name: API_URL
              valueFrom:
                configMapKeyRef:
                  name: docextract-config
                  key: API_URL
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8501
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8501
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
