apiVersion: apps/v1
kind: Deployment
metadata:
  name: docextract-api
  namespace: docextract
  labels:
    app.kubernetes.io/name: docextract
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: docextract
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: docextract
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          # Replace with your registry, e.g. ghcr.io/chunkytortoise/docextract-api:latest
          # or the ECR URI from: terraform -chdir=deploy/aws output ecr_api_repository_url
          image: docextract-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: docextract-config
            - secretRef:
                name: docextract-secrets
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: storage
              mountPath: /app/storage
      volumes:
        - name: storage
          emptyDir: {}
