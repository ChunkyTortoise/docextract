# Production patch: more OCR worker capacity
apiVersion: apps/v1
kind: Deployment
metadata:
  name: docextract-worker
  namespace: docextract
spec:
  replicas: 3
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
