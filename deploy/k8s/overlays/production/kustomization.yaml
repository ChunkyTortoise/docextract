apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: docextract

resources:
  - ../../  # Base manifests

patches:
  - path: api-deployment-patch.yaml
    target:
      kind: Deployment
      name: docextract-api
  - path: worker-deployment-patch.yaml
    target:
      kind: Deployment
      name: docextract-worker
