apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: docextract-api-hpa
  namespace: docextract
  labels:
    app.kubernetes.io/name: docextract
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: docextract-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Replicas
          value: 1
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Replicas
          value: 2
          periodSeconds: 60
---
# Worker HPA — scales on CPU (document processing is CPU-bound for OCR)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: docextract-worker-hpa
  namespace: docextract
  labels:
    app.kubernetes.io/name: docextract
    app.kubernetes.io/component: worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: docextract-worker
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 0
