apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: docextract-ingress
  namespace: docextract
  labels:
    app.kubernetes.io/name: docextract
  annotations:
    # Requires nginx ingress controller: kubectl apply -f
    # https://raw.githubusercontent.com/kubernetes/ingress-nginx/main/deploy/static/provider/cloud/deploy.yaml
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    # SSE requires buffering disabled to stream job progress events
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
spec:
  rules:
    - http:
        paths:
          # API routes — matched first (more specific prefix)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: docextract-api
                port:
                  number: 8000
          - path: /docs
            pathType: Prefix
            backend:
              service:
                name: docextract-api
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: docextract-api
                port:
                  number: 8000
          # Frontend catches everything else
          - path: /
            pathType: Prefix
            backend:
              service:
                name: docextract-frontend
                port:
                  number: 8501
